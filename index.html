<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز الراشد - إدارة الأقساط الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --primary: #1c4587; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --bg: #f4f7f9; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 900px; margin: 0 auto; }
        header { background: var(--primary); color: white; text-align: center; padding: 20px; border-radius: 15px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 6px 20px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        input { padding: 14px; border: 1px solid #c9d2db; border-radius: 10px; font-size: 16px; font-family: 'Cairo'; width: 100%; box-sizing: border-box; }
        button { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; transition: 0.3s; }
        button:disabled { background: #ccc !important; cursor: not-allowed; }
        .btn-add { background: var(--success); color: white; width: 100%; margin-top: 15px; font-size: 18px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-wa { background: #25D366; color: white; width: 100%; margin-top: 10px; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-print { background: #10b981; color: white; width: 100%; margin-top: 10px; font-size: 16px; }
        .btn-back { background: #64748b; color: white; margin-bottom: 15px; }
        .btn-del-user { background: #fee2e2; color: var(--danger); position: absolute; left: 25px; top: 25px; font-size: 14px; }
        
        .filter-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .filter-btn { flex: 1; min-width: 100px; padding: 10px; font-size: 14px; background: #e2e8f0; color: #475569; border: 1px solid #cbd5e1; }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #eee; }
        tr:hover { background: #f8fafc; cursor: pointer; }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        .badge-debt { background: #fee2e2; color: #b91c1c; }
        .badge-paid { background: #d1fae5; color: #065f46; border: 2px solid #065f46; }
        .badge-warning { background: #fffbeb; color: #92400e; border: 1px solid #f59e0b; }
        
        #toast-container { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 10000; pointer-events: none; }
        .toast { background: white; padding: 12px 25px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); margin-bottom: 10px; display: flex; align-items: center; gap: 10px; opacity: 0; transition: opacity 0.4s ease; border-right: 4px solid var(--primary); font-weight: bold; }
        #customerView { display: none; }
        .payment-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #f1f5f9; }
        #printTemplate { position: absolute; left: -9999px; top: -9999px; width: 450px; background: white; padding: 30px; border: 12px solid #1c4587; text-align: center; direction: rtl; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div id="printTemplate">
    <div style="border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px;">
        <h1 style="margin: 0; color: #1c4587; font-family: 'Cairo';">مركز الراشد للاتصالات</h1>
        <p style="margin: 5px 0; color: #666;">وصل تفاصيل الحساب</p>
    </div>
    <div style="text-align: right; font-size: 18px; line-height: 1.8;">
        <p><strong>اسم الزبون:</strong> <span id="pName"></span></p>
        <p><strong>نوع الجهاز:</strong> <span id="pModel"></span></p>
        <p><strong>السعر الكلي:</strong> <span id="pTotal"></span></p>
        <hr>
        <div style="background: #fdf2f2; padding: 15px; border-radius: 10px; text-align: center;">
            <p style="margin: 0; color: #666;">المبلغ المتبقي بذمتك:</p>
            <h2 style="margin: 5px 0; color: #ef4444;" id="pRem"></h2>
        </div>
    </div>
    <p style="margin-top: 20px; font-size: 13px; color: #999;">تاريخ الطباعة: <span id="pDate"></span></p>
</div>

<div class="container">
    <div id="mainView">
        <header><h1>📝 مركز الراشد - الأقساط</h1></header>
        
        <div class="card">
            <h2>تسجيل بيع جديد</h2>
            <div class="grid-form">
                <input type="text" id="custName" placeholder="اسم الزبون">
                <input type="text" id="custPhone" placeholder="رقم الهاتف (بدون صفر)">
                <input type="text" id="phoneModel" placeholder="نوع الجهاز">
                <input type="number" id="totalPrice" placeholder="السعر الكلي">
                <input type="number" id="firstPay" placeholder="المقدمة">
            </div>
            <div style="background: #fffbeb; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px solid #fde68a;">
                <label style="font-weight: bold; color: #92400e;">📅 يوم دفع القسط شهرياً (مثلاً يوم 10):</label>
                <input type="number" id="fixedDayInput" min="1" max="30" value="10" style="width: 100px; margin-right: 10px;">
            </div>
            <button class="btn-add" id="btnAddCustomer" onclick="addCustomer()">حفظ البيانات بالسحابة ☁️</button>
        </div>

        <div class="card">
            <input type="text" id="search" placeholder="🔍 ابحث عن اسم زبون..." onkeyup="renderTable()" style="margin-bottom: 15px;">
            
            <div class="filter-container">
                <button class="filter-btn active" id="f-all" onclick="setFilter('all')">الكل</button>
                <button class="filter-btn" id="f-today" onclick="setFilter('today')">قسط اليوم</button>
                <button class="filter-btn" id="f-soon" onclick="setFilter('soon')">باقي 1-3 أيام</button>
                <button class="filter-btn" id="f-late" onclick="setFilter('late')" style="color:var(--danger)">المتأخرين ⚠️</button>
            </div>

            <table>
                <thead><tr><th>الزبون</th><th>الجهاز</th><th>المتبقي</th><th>الحالة</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="customerView">
        <button class="btn-back" onclick="showMain()">⬅ رجوع</button>
        <div class="card">
            <h2 id="viewName" style="color: var(--primary);"></h2>
            <div id="deleteUserContainer"></div> 
            <p id="viewPhoneDisplay"></p>
            <div style="display:flex; flex-direction: column; gap:10px;">
                <p>السعر الكلي: <b id="viewTotal"></b></p>
                <p>المتبقي: <b id="viewRemaining" style="color:var(--danger); font-size: 24px;"></b></p>
                <p style="background: #eef2f6; padding: 10px; border-radius: 8px;">
                    📅 يوم الاستحقاق الثابت: <b id="viewFixedDayDisplay">--</b> بالشهر
                </p>
            </div>
            <button class="btn-wa" onclick="sendWhatsApp()">💬 إرسال تذكير واتساب</button>
            <button class="btn-print" onclick="printCustomerReceipt()">🖼️ طباعة وصل صوري</button>
        </div>
        <div class="card" id="payInputCard" style="background: #f0f9ff;">
            <h3>تسجيل قسط جديد</h3>
            <div class="grid-form">
                <input type="number" id="newPay" placeholder="المبلغ المستلم">
                <button class="btn-main" id="btnConfirmPay" onclick="addInstallment()">تأكيد الدفع</button>
            </div>
        </div>
        <div class="card"><h3>سجل المدفوعات</h3><div id="paymentsLog"></div></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBpt495yhuoTbjunCLIFCF_8c1NesxZHWs",
        authDomain: "shopweb-3466b.firebaseapp.com",
        databaseURL: "https://shopweb-3466b-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "shopweb-3466b",
        storageBucket: "shopweb-3466b.firebasestorage.app",
        messagingSenderId: "41811528812",
        appId: "1:41811528812:web:618f240f8106f218a8dc49"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let allCustomers = {};
    let currentId = null;
    let lastVisitKey = ""; 
    let activeFilter = 'all';
    const SITE_URL = "https://alrashedstore.netlify.app"; 

    function showToast(msg, type = 'primary') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderRightColor = `var(--${type})`;
        toast.innerHTML = `🔔 ${msg}`;
        container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '1'; }, 10);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 400); }, 4000);
    }

    function checkSystemAlerts() {
        db.ref('lastVisit').on('value', snap => {
            const v = snap.val();
            if(v && v.time && v.time > Date.now() - 15000) {
                const currentKey = v.name + v.time;
                if(currentKey !== lastVisitKey) {
                    lastVisitKey = currentKey;
                    showToast(`الزبون <b>${v.name}</b> يتصفح حسابه الآن`, 'warning');
                }
            }
        });
    }

    function calculateFixedNextDate(fixedDay) {
        let now = new Date();
        let day = parseInt(fixedDay);
        let nextDate = new Date(now.getFullYear(), now.getMonth(), day, 10, 0, 0);
        if (nextDate <= now) {
            nextDate.setMonth(nextDate.getMonth() + 1);
        }
        let lastDay = new Date(nextDate.getFullYear(), nextDate.getMonth() + 1, 0).getDate();
        nextDate.setDate(Math.min(day, lastDay));
        return nextDate.getTime();
    }

    function loadData() {
        db.ref('installments').on('value', (snap) => {
            allCustomers = snap.val() || {};
            renderTable();
            checkSystemAlerts();
            if(currentId) showCustomer(currentId);
        });
    }

    function setFilter(filter) {
        activeFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('f-' + filter).classList.add('active');
        renderTable();
    }

    function renderTable() {
        const term = document.getElementById('search').value.toLowerCase();
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        const now = new Date();
        now.setHours(0,0,0,0);

        Object.keys(allCustomers).forEach(id => {
            const c = allCustomers[id];
            if(!c.name.toLowerCase().includes(term)) return;

            const paid = (c.payments || []).reduce((s, p) => s + p.amount, 0);
            const rem = Math.max(0, c.total - paid);
            
            let daysDiff = 0;
            if(c.nextDueDate && rem > 0) {
                const dueDate = new Date(c.nextDueDate);
                dueDate.setHours(0,0,0,0);
                daysDiff = Math.ceil((dueDate.getTime() - now.getTime()) / (1000 * 3600 * 24));
            }

            let show = (activeFilter === 'all') || 
                       (activeFilter === 'today' && daysDiff === 0) ||
                       (activeFilter === 'soon' && daysDiff >= 1 && daysDiff <= 3) ||
                       (activeFilter === 'late' && daysDiff < 0);

            if(!show) return;

            let statusBadge = '';
            if(rem <= 0) statusBadge = '<span class="badge badge-paid">تم الدفع</span>';
            else if(daysDiff < 0) statusBadge = `<span class="badge badge-debt">متأخر ${Math.abs(daysDiff)} يوم</span>`;
            else if(daysDiff === 0) statusBadge = '<span class="badge badge-warning">الموعد اليوم</span>';
            else statusBadge = `<span class="badge badge-debt">باقي ${daysDiff} يوم</span>`;

            body.innerHTML += `<tr onclick="showCustomer('${id}')">
                <td><b>${c.name}</b></td>
                <td>${c.model}</td>
                <td>${formatNum(rem)}</td>
                <td>${statusBadge}</td>
            </tr>`;
        });
    }

    function addCustomer() {
        const name = document.getElementById('custName').value.trim();
        const total = parseFloat(document.getElementById('totalPrice').value);
        const first = parseFloat(document.getElementById('firstPay').value) || 0;
        const fixedDay = parseInt(document.getElementById('fixedDayInput').value) || 10;

        if(!name || isNaN(total)) return showToast("أكمل البيانات", "danger");
        
        let nextDueDate = calculateFixedNextDate(fixedDay);
        db.ref('installments').push({
            name, phone: document.getElementById('custPhone').value, model: document.getElementById('phoneModel').value, 
            total, purchaseDate: getEngDate(), fixedDay, nextDueDate,
            payments: first > 0 ? [{amount: first, date: getEngDate(), time: Date.now()}] : []
        }).then(() => {
            showToast("تم الحفظ بنجاح", "success");
            document.querySelectorAll('.grid-form input').forEach(i => i.value = '');
        });
    }

    function addInstallment() {
        const val = parseFloat(document.getElementById('newPay').value);
        if(isNaN(val) || val <= 0) return;
        const c = allCustomers[currentId];
        const payments = c.payments || [];
        payments.push({ amount: val, date: getEngDate(), time: Date.now() });
        
        let currentNext = new Date(c.nextDueDate);
        currentNext.setMonth(currentNext.getMonth() + 1);
        let lastDay = new Date(currentNext.getFullYear(), currentNext.getMonth() + 1, 0).getDate();
        currentNext.setDate(Math.min(c.fixedDay, lastDay));

        db.ref('installments/' + currentId).update({ 
            payments: payments, 
            nextDueDate: currentNext.getTime() 
        }).then(() => {
            showToast("تم تسجيل الدفعة وتحديث التاريخ", "success");
            document.getElementById('newPay').value = '';
        });
    }

    function sendWhatsApp() {
        const c = allCustomers[currentId];
        const paid = (c.payments || []).reduce((s, p) => s + p.amount, 0);
        const rem = c.total - paid;
        const now = new Date(); now.setHours(0,0,0,0);
        const dueDate = new Date(c.nextDueDate); dueDate.setHours(0,0,0,0);
        const diff = Math.ceil((dueDate.getTime() - now.getTime()) / (1000 * 3600 * 24));

        let statusMsg = "";
        if (diff < 0) statusMsg = `متأخر بـ ${Math.abs(diff)} يوم ⚠️`;
        else if (diff === 0) statusMsg = `موعد القسط هو اليوم 📅`;
        else statusMsg = `موعد القسط القادم بعد ${diff} يوم ⏳`;

        // اعتماد نموذج 35-أ (الأول) كما طلبت
        const text = `*مركز الراشد للاتصالات* 📱✨%0A` +
                     `السلام عليكم، زبوننا العزيز أستاذ *${c.name}* من مركز الراشد المحترم..%0A%0A` +
                     `نحيطكم علماً بتفاصيل حساب جهازكم 📱 *(${c.model})*:%0A` +
                     `💰 *المبلغ المتبقي:* ${rem.toLocaleString()} د.ع%0A` +
                     `🗓️ *حالة القسط:* ${statusMsg}%0A%0A` +
                     `لمتابعة حالة قسطك وتفاصيل وصولاتك، يرجى الدخول على الرابط أدناه 👇:%0A` +
                     `🔗 ${SITE_URL}/?id=${currentId}%0A%0A` +
                     `شكراً لتفهمك، مركز الراشد للاتصالات. 🌹`;

        window.open(`https://wa.me/964${c.phone}?text=${text}`);
    }

    function showCustomer(id) {
        currentId = id; const c = allCustomers[id]; if(!c) return showMain();
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('customerView').style.display = 'block';
        document.getElementById('viewName').innerText = c.name;
        document.getElementById('viewPhoneDisplay').innerText = `الجهاز: ${c.model} | الهاتف: ${c.phone}`;
        document.getElementById('viewTotal').innerText = formatNum(c.total) + " د.ع";
        document.getElementById('viewFixedDayDisplay').innerText = c.fixedDay;
        document.getElementById('deleteUserContainer').innerHTML = `<button class="btn-del-user" onclick="confirmDeleteUser()">🗑️ حذف الزبون</button>`;
        const log = document.getElementById('paymentsLog'); log.innerHTML = '';
        let totalPaid = 0;
        if(c.payments) {
            c.payments.forEach(p => {
                totalPaid += p.amount;
                log.innerHTML += `<div class="payment-item"><b>${formatNum(p.amount)} د.ع</b> <span>${p.date}</span></div>`;
            });
        }
        document.getElementById('viewRemaining').innerText = formatNum(c.total - totalPaid) + " د.ع";
        document.getElementById('payInputCard').style.display = (c.total - totalPaid <= 0) ? 'none' : 'block';
    }

    function printCustomerReceipt() {
        const c = allCustomers[currentId];
        const paid = (c.payments || []).reduce((s, p) => s + p.amount, 0);
        document.getElementById('pName').innerText = c.name;
        document.getElementById('pModel').innerText = c.model;
        document.getElementById('pTotal').innerText = formatNum(c.total);
        document.getElementById('pRem').innerText = formatNum(c.total - paid);
        document.getElementById('pDate').innerText = new Date().toLocaleDateString('ar-EG');
        html2canvas(document.getElementById('printTemplate'), { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `وصل_${c.name}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    function showMain() { currentId = null; document.getElementById('mainView').style.display = 'block'; document.getElementById('customerView').style.display = 'none'; }
    function confirmDeleteUser() { if(confirm("هل أنت متأكد من الحذف؟")) db.ref('installments/' + currentId).remove().then(() => showMain()); }
    function formatNum(n) { return Number(n).toLocaleString(); }
    function getEngDate() { return new Date().toLocaleString('en-GB'); }
    loadData();
</script>
</body>
</html>
